# Example Asphallea policy.
#
# A least-privilege policy for an agent that can read a workspace, write to one
# output directory, search the web through a paid API, and run shell commands
# under OS containment. Load it with:
#
#   from asphallea import Policy
#   policy = Policy.from_yaml("policies/example.yaml")

name: least-privilege-agent

# Which tools the agent may call, and how each tool's arguments map to resources.
#
# `args` is the important part: it declares that a tool's `path` argument is a
# filesystem read or write, so the engine can check that value against the
# allowlists below. That is what lets this policy govern tools it did not author,
# such as an MCP server's tool-calls. Declaring a tool under `args` also
# allowlists it.
tools:
  allow:
    - search
    - run_shell
  # Denied outright. A denial wins even if the tool is also allowlisted.
  deny:
    - filesystem.delete
  args:
    read_file:
      reads: path
    write_file:
      writes: path
    filesystem.delete:
      writes: path
    search:
      network: url

# Filesystem allowlist. Paths are normalized to absolute, symlink-resolved form.
# A write path also grants read. Everything outside these prefixes is denied.
filesystem:
  read:
    - ./workspace
  write:
    - ./workspace/out

# Deny network by default, then allow specific hosts. A tool-call's declared
# network argument (see search's `network: url` above) is checked against these
# rules: the host must match an allow entry or the call is denied. A host rule
# also covers its subdomains, so `example.com` permits `api.example.com`. The OS
# containment tier remains all-or-nothing for subprocesses; host rules govern the
# declared network arguments of tool-calls.
network:
  default: deny
  allow_hosts:
    - api.search.example.com
  # deny_hosts wins even when the default is allow.
  # deny_hosts:
  #   - metadata.google.internal

limits:
  # Wall-clock ceiling for a single tool call, in seconds.
  timeout_seconds: 30

  # Per-tool total call ceilings.
  calls:
    search: 25
    run_shell: 10

  # Per-tool sliding-window rate limits.
  rate:
    search:
      per_minute: 30

  # OS resource limits for the containment tier (Linux).
  cpu_seconds: 10
  memory_mb: 512
  max_file_size_mb: 100
  max_processes: 64
  max_open_files: 256

# Spend caps model a paid tool as a maximum number of invocations. Real-time
# dollar metering is out of scope for v0.
spend:
  search:
    max_calls: 25
