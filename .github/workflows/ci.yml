name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  policy-tier:
    # The policy tier is cross-platform pure Python. It must pass identically on
    # all three operating systems. The containment tests self-skip here because
    # no core binary is present.
    name: policy tier (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install ".[dev]"
      - run: pytest -q

  core-build:
    # The launcher must compile on every OS: the real enforcement on Linux, and
    # the honest "containment unavailable" stub on macOS and Windows. The Linux
    # crates are target-gated, so this proves the cross-platform story holds.
    name: core build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --manifest-path core/Cargo.toml
      - name: probe reports honestly
        shell: bash
        run: |
          out=$(core/target/release/asphallea-run --probe)
          echo "$out"
          echo "$out" | grep -q '"platform"'

  rust-quality:
    # The core must stay formatted and lint-clean. clippy runs against the Linux
    # target because the enforcement code is Linux-gated.
    name: rust fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: format check
        run: cargo fmt --manifest-path core/Cargo.toml --check
      - name: clippy
        run: cargo clippy --manifest-path core/Cargo.toml -- -D warnings

  containment-tier:
    # Linux only. This builds the Rust core (compile-checking it) and runs the
    # suite with the core binary available, so the real OS containment tests
    # execute: blocked reads and writes outside the allowlist, and the capability
    # probe. This is the proof the containment tier holds.
    name: containment tier (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: build the core
        run: cargo build --release --manifest-path core/Cargo.toml
      - name: install the SDK
        run: pip install ".[dev]"
      - name: run tests with OS containment
        env:
          ASPHALLEA_CORE_BIN: ${{ github.workspace }}/core/target/release/asphallea-run
        run: pytest -q
      - name: run the injection demo
        env:
          ASPHALLEA_CORE_BIN: ${{ github.workspace }}/core/target/release/asphallea-run
        run: python examples/demo.py

  containment-windows:
    # Builds the Windows core and runs the suite with the backend available, so the
    # Windows containment tests execute: the AppContainer blocks reads and writes
    # outside the allowlist and allows the workspace, and the Job Object bounds
    # resources.
    name: containment tier (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: clippy (windows target)
        run: cargo clippy --manifest-path core/Cargo.toml -- -D warnings
      - name: build the core
        run: cargo build --release --manifest-path core/Cargo.toml
      - name: install the SDK
        run: pip install ".[dev]"
      - name: run tests with Job Object containment
        env:
          ASPHALLEA_CORE_BIN: ${{ github.workspace }}\core\target\release\asphallea-run.exe
        run: pytest -q
      - name: run the injection demo
        env:
          ASPHALLEA_CORE_BIN: ${{ github.workspace }}\core\target\release\asphallea-run.exe
        run: python examples/demo.py

  containment-macos:
    # Builds the macOS core and runs the suite with the Seatbelt backend available,
    # so the macOS containment tests execute: reads outside the allowlist blocked,
    # the workspace allowed, out-of-bounds writes blocked.
    name: containment tier (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: clippy (macos target)
        run: cargo clippy --manifest-path core/Cargo.toml -- -D warnings
      - name: build the core
        run: cargo build --release --manifest-path core/Cargo.toml
      - name: install the SDK
        run: pip install ".[dev]"
      - name: DEBUG seatbelt (temporary)
        continue-on-error: true
        run: |
          set +e
          echo "macOS: $(sw_vers -productVersion)  arch: $(uname -m)"
          WS="$RUNNER_TEMP/dbg_ws"; mkdir -p "$WS"; echo "HELLO-SEATBELT" > "$WS/f.txt"
          IO='(allow file-read-data file-write-data (require-not (subpath "/")))(allow file-read* file-write* (subpath "/dev"))(allow file-ioctl)'
          BASE="(version 1)(deny default)(allow process*)(allow mach*)(allow sysctl-read)(allow signal)(allow file-read-metadata)$IO"
          READ='(allow file-read* (subpath "'"$WS"'") (subpath "/usr") (subpath "/System") (subpath "/System/Volumes/Preboot/Cryptexes") (subpath "/Library") (subpath "/bin") (subpath "/sbin") (subpath "/etc") (subpath "/private/etc") (subpath "/private/var/db") (subpath "/private/var/folders") (subpath "/opt"))'
          echo "== run the restricted profile, then read the kernel's sandbox denials =="
          sandbox-exec -p "$BASE$READ(allow file-map-executable)" /bin/cat "$WS/f.txt"; echo "exit=$?"
          echo "-- Sandbox denials in the last 60s (exact op + path) --"
          log show --last 60s --style compact --predicate 'eventMessage CONTAINS "deny"' 2>/dev/null | grep -iE "cat|sandbox|deny" | grep -ivE "sandboxd|kernel\]" | sort -u | head -40
          echo "-- fallback: any Sandbox-subsystem messages --"
          log show --last 60s --style compact --predicate 'subsystem == "com.apple.sandbox"' 2>/dev/null | tail -30
      - name: run tests with Seatbelt containment
        env:
          ASPHALLEA_CORE_BIN: ${{ github.workspace }}/core/target/release/asphallea-run
        run: pytest -q
      - name: run the injection demo
        env:
          ASPHALLEA_CORE_BIN: ${{ github.workspace }}/core/target/release/asphallea-run
        run: python examples/demo.py
